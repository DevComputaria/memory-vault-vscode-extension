name: 🚀 Release VSIX + Tests

on:
  release:
    types: [created]
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --ignore-scripts

      - name: 🔍 Run Type Check
        run: npm run compile -- --noEmit

      - name: 🧪 Run Unit Tests
        run: npm test

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build-vsix:
    name: 📦 Build VSIX
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --ignore-scripts

      - name: 🔨 Compile TypeScript
        run: npm run compile

      - name: 📦 Generate .vsix
        run: npm run package

      - name: 📤 Upload VSIX to Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Show artifact
        run: 'echo "✅ VSIX gerado: $(ls *.vsix)"'