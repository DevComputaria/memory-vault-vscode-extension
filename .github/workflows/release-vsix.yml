name: 🚀 Release VSIX

on:
  # Dispara automaticamente quando você cria uma Release no GitHub
  release:
    types: [created]

  # Ou quando você faz push de uma tag no formato vX.Y.Z
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-vsix:
    name: Build & Publish VSIX
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Necessário para fazer upload na Release

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --ignore-scripts

      - name: 🔨 Compile TypeScript
        run: npm run compile

      - name: 📦 Generate .vsix
        run: npm run package

      - name: 📤 Upload VSIX to Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          # Opcional: gerar release notes automaticamente a partir do changelog
          # generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Show artifact name
        run: echo "✅ VSIX gerado: $(ls *.vsix)"